version: 2

models:
  - name: mart_weather
    description: "Weekly aggregated weather summary per city"
    columns:
      - name: CITY_NAME
        description: "City name"
        tests:
          - not_null
          - unique

      - name: COUNTRY
        description: "Country name"
        tests:
          - not_null

      - name: LOAD_DATE
        description: "Date the data was loaded"
        tests:
          - not_null

      - name: AVG_TEMP_C
        description: "Average temperature for the week"
        tests:
          - not_null

      - name: WEEK_HIGH_C
        description: "Highest temperature of the week"
        tests:
          - not_null

      - name: WEEK_LOW_C
        description: "Lowest temperature of the week"
        tests:
          - not_null

      - name: TOTAL_PRECIPITATION_MM
        description: "Total rainfall for the week in mm"
        tests:
          - not_null

      - name: RAINY_DAYS
        description: "Number of rainy days in the forecast"
        tests:
          - not_null

      - name: DAYS_FORECASTED
        description: "Number of days in the forecast"
        tests:
          - not_null

      - name: WEEK_TEMP_CATEGORY
        description: "Temperature category for the week"
        tests:
          - not_null
          - accepted_values:
              values: ['Very Hot', 'Hot', 'Warm', 'Comfortable', 'Cool', 'Cold']